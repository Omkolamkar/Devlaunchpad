<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lookbook</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
 <section class="left">
  <header>
    <h1>LOOKBOOK</h1>
    <nav>
      <a>MAN</a>
      <a>WOMEN</a>
    </nav>
  </header>

  <div class="poster">
    <img src="https://images.unsplash.com/photo-1621784564114-6eea05b89863">
  </div>

  <div class="meta">
    <div class="volumes">
      <p><b>volume1</b></p>
      <p><b>volume2</b></p>
    </div>
    <p class="desc">
      Lorem ipsum dolor sit amet<br>
      adipisicing elit. Placeat amet<br>
      aspernatur provident minima<br>
      suscipit, eligendi iste.
    </p>
  </div>

  <div class="scroll">
    <span>scroll down</span>
    <div class="line"></div>
  </div>
</section>

  <section class="center">
    <img class="hero"
      src="https://images.unsplash.com/photo-1621784562877-e971f1f79f47">

    <div class="title">
      <h2>The Great</h2>
      <h2>Escape</h2>
      <p>ISSUE OUT NOW</p>
    </div>

    <img class="mini"
      src="https://images.unsplash.com/photo-1525527735744-fe20e1261c32?q=80&w=1887&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
  </section>

  <section class="right">
    <div class="social">
      <span>facebook</span>
      <span>twitter</span>
      <span>instagram</span>
    </div>
  </section>

</div>

</body>
</html>
